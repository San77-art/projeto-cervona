<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>E-Cernova · Livro Caixa Rural</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>
  :root {
    --surface-1:      #fcfcfb;
    --page-plane:     #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --series-1:       #2a78d6; /* blue */
    --good:           #0ca30c;
    --warning:        #fab219;
    --serious:        #ec835a;
    --critical:       #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1:      #1a1a19;
      --page-plane:     #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --baseline:       #383835;
      --border:         rgba(255,255,255,0.10);
      --series-1:       #3987e5;
      --good:           #0ca30c;
      --warning:        #fab219;
      --serious:        #ec835a;
      --critical:       #d03b3b;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--page-plane);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  #root { min-height: 100vh; }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 24px 20px 64px; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .brand { display: flex; flex-direction: column; gap: 2px; }
  .brand h1 { font-size: 20px; margin: 0; font-weight: 600; }
  .brand p { margin: 0; font-size: 13px; color: var(--text-secondary); }

  .api-config {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text-secondary);
  }
  .api-config input {
    width: 260px; font-size: 12px; padding: 6px 8px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--surface-1); color: var(--text-primary);
    font-family: inherit;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .dot.ok { background: var(--good); }
  .dot.err { background: var(--critical); }
  .dot.pending { background: var(--text-muted); }

  .banner {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 8px; font-size: 13px;
    margin-bottom: 20px; border: 1px solid var(--border);
    background: var(--surface-1); color: var(--text-primary);
  }
  .banner.error { border-color: var(--critical); }
  .banner .dot.err { flex: none; }

  .stats-row {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px;
    margin-bottom: 16px;
  }
  @media (max-width: 900px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }

  .stat-tile {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
  }
  .stat-tile .label {
    font-size: 12px; color: var(--text-secondary); margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .stat-tile .value {
    font-size: 26px; font-weight: 600; line-height: 1.1;
  }

  .card {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px; margin-bottom: 20px;
  }
  .card h2 {
    font-size: 14px; font-weight: 600; margin: 0 0 14px;
    color: var(--text-primary);
  }

  .status-bar-track {
    display: flex; gap: 2px; height: 22px; border-radius: 6px;
    overflow: hidden; background: var(--surface-1);
  }
  .status-bar-seg { height: 100%; }
  .status-bar-seg:first-child { border-top-left-radius: 4px; border-bottom-left-radius: 4px; }
  .status-bar-seg:last-child { border-top-right-radius: 4px; border-bottom-right-radius: 4px; }
  .status-legend {
    display: flex; gap: 18px; flex-wrap: wrap; margin-top: 12px; font-size: 12px;
  }
  .status-legend .item { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
  .status-legend .swatch { width: 10px; height: 10px; border-radius: 2px; flex: none; }
  .status-legend b { color: var(--text-primary); font-weight: 600; }

  .dropzone {
    border: 1.5px dashed var(--baseline); border-radius: 10px;
    padding: 28px 16px; text-align: center; color: var(--text-secondary);
    font-size: 13px; cursor: pointer; transition: border-color .15s, background .15s;
  }
  .dropzone.drag { border-color: var(--series-1); background: rgba(42,120,214,0.06); }
  .dropzone strong { color: var(--text-primary); }
  .dropzone input { display: none; }

  .queue { margin-top: 14px; display: flex; flex-direction: column; gap: 6px; }
  .queue-item {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    font-size: 12.5px; padding: 8px 10px; border-radius: 6px;
    background: var(--page-plane); border: 1px solid var(--border);
  }
  .queue-item .fname { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .queue-item .qstatus { flex: none; display: flex; align-items: center; gap: 6px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left; font-weight: 600; color: var(--text-secondary);
    font-size: 11.5px; text-transform: uppercase; letter-spacing: .03em;
    padding: 8px 10px; border-bottom: 1px solid var(--gridline);
  }
  tbody td {
    padding: 10px; border-bottom: 1px solid var(--gridline);
    font-variant-numeric: tabular-nums;
  }
  tbody tr.row-clickable { cursor: pointer; }
  tbody tr.row-clickable:hover { background: var(--page-plane); }
  tbody tr.row-selected { background: rgba(42,120,214,0.08); }
  .empty-state {
    padding: 32px 10px; text-align: center; color: var(--text-muted); font-size: 13px;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 500; color: var(--text-primary);
  }
  .badge .swatch { width: 8px; height: 8px; border-radius: 50%; flex: none; }

  .toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .btn {
    font-family: inherit; font-size: 12.5px; padding: 7px 12px;
    border-radius: 6px; border: 1px solid var(--border);
    background: var(--surface-1); color: var(--text-primary); cursor: pointer;
  }
  .btn:hover { border-color: var(--series-1); }
  .btn.primary { background: var(--series-1); color: #fff; border-color: var(--series-1); }

  .drawer {
    position: fixed; top: 0; right: 0; height: 100vh; width: 420px; max-width: 92vw;
    background: var(--surface-1); border-left: 1px solid var(--border);
    box-shadow: -8px 0 24px rgba(0,0,0,0.15);
    transform: translateX(100%); transition: transform .2s ease;
    z-index: 50; display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-head {
    padding: 16px 18px; border-bottom: 1px solid var(--gridline);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
  }
  .drawer-head h3 { margin: 0 0 4px; font-size: 14px; }
  .drawer-head p { margin: 0; font-size: 12px; color: var(--text-secondary); }
  .drawer-close {
    background: none; border: none; color: var(--text-secondary);
    font-size: 18px; cursor: pointer; line-height: 1; padding: 4px;
  }
  .drawer-body { padding: 16px 18px; overflow-y: auto; flex: 1; }
  .scrim {
    position: fixed; inset: 0; background: rgba(0,0,0,0.25); z-index: 40;
    opacity: 0; pointer-events: none; transition: opacity .2s ease;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }

  .confidence-meter {
    height: 6px; border-radius: 3px; background: var(--gridline);
    overflow: hidden; margin-top: 6px;
  }
  .confidence-meter > div { height: 100%; background: var(--series-1); border-radius: 3px; }

  .modal-scrim {
    position: fixed; inset: 0; background: rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 60; padding: 20px;
  }
  .modal-card {
    background: var(--surface-1); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; width: 100%; max-width: 340px;
    display: flex; flex-direction: column; gap: 14px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  .modal-card h2 { margin: 0; font-size: 16px; }
  .modal-sub { margin: -8px 0 0; font-size: 12.5px; color: var(--text-secondary); }
  .field { display: flex; flex-direction: column; gap: 4px; font-size: 12.5px; color: var(--text-secondary); }
  .field input {
    font-family: inherit; font-size: 13.5px; padding: 8px 10px;
    border: 1px solid var(--border); border-radius: 6px;
    background: var(--page-plane); color: var(--text-primary);
  }
  .field input:focus { outline: none; border-color: var(--series-1); }
  .modal-card .btn.primary { width: 100%; padding: 9px 12px; font-size: 13px; }
  .modal-card .btn.primary:disabled { opacity: 0.6; cursor: default; }

  footer.hint { margin-top: 8px; font-size: 11.5px; color: var(--text-muted); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useRef } = React;

const DEFAULT_API_BASE = "http://localhost:8000/api/v1";

const STATUS_META = {
  processed:  { role: "good",     color: "var(--good)",     label: "Processado" },
  pending:    { role: "warning",  color: "var(--warning)",  label: "Pendente" },
  processing: { role: "serious",  color: "var(--serious)",  label: "Processando" },
  failed:     { role: "critical", color: "var(--critical)", label: "Falhou" },
};

function statusMeta(status) {
  return STATUS_META[status] || { role: "muted", color: "var(--text-muted)", label: status || "—" };
}

function formatDate(iso) {
  if (!iso) return "—";
  try {
    return new Date(iso).toLocaleString("pt-BR", {
      day: "2-digit", month: "2-digit", year: "numeric",
      hour: "2-digit", minute: "2-digit",
    });
  } catch (e) {
    return iso;
  }
}

function formatNumber(n, digits) {
  if (n === null || n === undefined || Number.isNaN(n)) return "—";
  return Number(n).toLocaleString("pt-BR", {
    minimumFractionDigits: digits || 0,
    maximumFractionDigits: digits || 0,
  });
}

function StatusBadge({ status }) {
  const meta = statusMeta(status);
  return (
    <span className="badge">
      <span className="swatch" style={{ background: meta.color }} />
      {meta.label}
    </span>
  );
}

function StatTile({ label, value, dot }) {
  return (
    <div className="stat-tile">
      <div className="label">
        {dot && <span className="swatch" style={{ width: 8, height: 8, borderRadius: "50%", background: dot, display: "inline-block" }} />}
        {label}
      </div>
      <div className="value">{value}</div>
    </div>
  );
}

function StatusDistribution({ dashboard }) {
  if (!dashboard || !dashboard.total_xmls) {
    return <div className="empty-state">Nenhum XML enviado ainda.</div>;
  }
  const segments = [
    { key: "processed", count: dashboard.processed, color: "var(--good)", label: "Processados" },
    { key: "pending", count: dashboard.pending, color: "var(--warning)", label: "Pendentes" },
    { key: "failed", count: dashboard.failed, color: "var(--critical)", label: "Falharam" },
  ].filter(s => s.count > 0);

  const total = dashboard.total_xmls || 1;

  return (
    <div>
      <div className="status-bar-track">
        {segments.map(s => (
          <div
            key={s.key}
            className="status-bar-seg"
            style={{ width: `${(s.count / total) * 100}%`, background: s.color }}
            title={`${s.label}: ${s.count}`}
          />
        ))}
      </div>
      <div className="status-legend">
        {segments.map(s => (
          <div className="item" key={s.key}>
            <span className="swatch" style={{ background: s.color }} />
            {s.label}: <b>{s.count}</b>
          </div>
        ))}
      </div>
    </div>
  );
}

function Dropzone({ onFiles, disabled }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef(null);

  const handleDrop = (e) => {
    e.preventDefault();
    setDragging(false);
    if (disabled) return;
    const files = Array.from(e.dataTransfer.files || []).filter(f => f.name.toLowerCase().endsWith(".xml"));
    if (files.length) onFiles(files);
  };

  return (
    <div
      className={"dropzone" + (dragging ? " drag" : "")}
      onDragOver={(e) => { e.preventDefault(); if (!disabled) setDragging(true); }}
      onDragLeave={() => setDragging(false)}
      onDrop={handleDrop}
      onClick={() => !disabled && inputRef.current && inputRef.current.click()}
    >
      <div><strong>Arraste arquivos XML aqui</strong> ou clique para selecionar</div>
      <div style={{ marginTop: 4 }}>Notas fiscais eletrônicas (NFe) em formato .xml</div>
      <input
        ref={inputRef}
        type="file"
        accept=".xml"
        multiple
        disabled={disabled}
        onChange={(e) => {
          const files = Array.from(e.target.files || []);
          if (files.length) onFiles(files);
          e.target.value = "";
        }}
      />
    </div>
  );
}

function ExtractedDrawer({ open, onClose, xmlDoc, data, loading, error }) {
  return (
    <React.Fragment>
      <div className={"scrim" + (open ? " open" : "")} onClick={onClose} />
      <div className={"drawer" + (open ? " open" : "")}>
        <div className="drawer-head">
          <div>
            <h3>{xmlDoc ? xmlDoc.filename : "Itens extraídos"}</h3>
            <p>{xmlDoc ? `Enviado em ${formatDate(xmlDoc.uploaded_at)}` : ""}</p>
          </div>
          <button className="drawer-close" onClick={onClose} aria-label="Fechar">✕</button>
        </div>
        <div className="drawer-body">
          {loading && <div className="empty-state">Carregando itens…</div>}
          {!loading && error && (
            <div className="banner error"><span className="dot err" />{error}</div>
          )}
          {!loading && !error && data && (
            <React.Fragment>
              {data.confidence_score !== null && data.confidence_score !== undefined && (
                <div style={{ marginBottom: 16 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: "var(--text-secondary)" }}>
                    <span>Confiança geral</span>
                    <span><b style={{ color: "var(--text-primary)" }}>{formatNumber(data.confidence_score * 100, 1)}%</b></span>
                  </div>
                  <div className="confidence-meter">
                    <div style={{ width: `${Math.min(100, data.confidence_score * 100)}%` }} />
                  </div>
                </div>
              )}
              {data.items && data.items.length ? (
                <table>
                  <thead>
                    <tr>
                      <th>NCM</th>
                      <th>CFOP</th>
                      <th>CST</th>
                      <th style={{ textAlign: "right" }}>Qtd.</th>
                      <th style={{ textAlign: "right" }}>Valor</th>
                    </tr>
                  </thead>
                  <tbody>
                    {data.items.map((item, i) => (
                      <tr key={i}>
                        <td>{item.ncm || "—"}</td>
                        <td>{item.cfop || "—"}</td>
                        <td>{item.cst || "—"}</td>
                        <td style={{ textAlign: "right" }}>{formatNumber(item.quantity, 2)}</td>
                        <td style={{ textAlign: "right" }}>{item.value != null ? `R$ ${formatNumber(item.value, 2)}` : "—"}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              ) : (
                <div className="empty-state">Nenhum item extraído para este XML.</div>
              )}
            </React.Fragment>
          )}
        </div>
      </div>
    </React.Fragment>
  );
}

function LoginModal({ apiBase, onLogin }) {
  const [username, setUsername] = useState("admin");
  const [password, setPassword] = useState("");
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState(null);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setSubmitting(true);
    setError(null);
    try {
      const form = new URLSearchParams();
      form.set("username", username);
      form.set("password", password);
      const res = await fetch(`${apiBase}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: form.toString(),
      });
      if (!res.ok) {
        let detail = "Usuário ou senha inválidos.";
        try { const body = await res.json(); detail = body.error || body.detail || detail; } catch (e) {}
        throw new Error(detail);
      }
      const data = await res.json();
      onLogin(data.access_token);
    } catch (err) {
      setError(err.message || "Não foi possível entrar.");
    } finally {
      setSubmitting(false);
    }
  };

  return (
    <div className="modal-scrim">
      <form className="modal-card" onSubmit={handleSubmit}>
        <div>
          <h2>Entrar</h2>
          <p className="modal-sub">Autentique-se para enviar e visualizar XMLs.</p>
        </div>
        {error && <div className="banner error"><span className="dot err" />{error}</div>}
        <label className="field">
          <span>Usuário</span>
          <input
            value={username}
            onChange={(e) => setUsername(e.target.value)}
            autoFocus
            autoComplete="username"
          />
        </label>
        <label className="field">
          <span>Senha</span>
          <input
            type="password"
            value={password}
            onChange={(e) => setPassword(e.target.value)}
            autoComplete="current-password"
          />
        </label>
        <button className="btn primary" type="submit" disabled={submitting || !username || !password}>
          {submitting ? "Entrando…" : "Entrar"}
        </button>
      </form>
    </div>
  );
}

function App() {
  const [apiBase, setApiBase] = useState(() => localStorage.getItem("cernova_api_base") || DEFAULT_API_BASE);
  const [token, setToken] = useState(() => localStorage.getItem("cernova_token") || null);
  const [apiOk, setApiOk] = useState(null); // null=unknown, true/false
  const [dashboard, setDashboard] = useState(null);
  const [xmlList, setXmlList] = useState({ total: 0, items: [] });
  const [globalError, setGlobalError] = useState(null);
  const [uploading, setUploading] = useState(false);
  const [queue, setQueue] = useState([]); // [{name, status: 'uploading'|'done'|'error', message}]
  const [selectedId, setSelectedId] = useState(null);
  const [selectedDoc, setSelectedDoc] = useState(null);
  const [extracted, setExtracted] = useState(null);
  const [extractedLoading, setExtractedLoading] = useState(false);
  const [extractedError, setExtractedError] = useState(null);
  const [lastUpdated, setLastUpdated] = useState(null);

  useEffect(() => { localStorage.setItem("cernova_api_base", apiBase); }, [apiBase]);

  useEffect(() => {
    if (token) localStorage.setItem("cernova_token", token);
    else localStorage.removeItem("cernova_token");
  }, [token]);

  const fetchJson = useCallback(async (path, opts) => {
    const headers = { ...((opts && opts.headers) || {}) };
    if (token) headers["Authorization"] = `Bearer ${token}`;
    const res = await fetch(`${apiBase}${path}`, { ...opts, headers });
    if (res.status === 401) {
      setToken(null);
      const err = new Error("Sessão expirada. Faça login novamente.");
      err.isAuthError = true;
      throw err;
    }
    if (!res.ok) {
      let detail = res.statusText;
      try { const body = await res.json(); detail = body.error || body.detail || detail; } catch (e) {}
      throw new Error(detail || `HTTP ${res.status}`);
    }
    return res.json();
  }, [apiBase, token]);

  const refresh = useCallback(async () => {
    if (!token) return;
    try {
      const [dash, list] = await Promise.all([
        fetchJson("/dashboard"),
        fetchJson("/xml?skip=0&limit=20"),
      ]);
      setDashboard(dash);
      setXmlList(list);
      setApiOk(true);
      setGlobalError(null);
      setLastUpdated(new Date());
    } catch (e) {
      setApiOk(false);
      if (!e.isAuthError) {
        setGlobalError(`Não foi possível conectar à API em ${apiBase}. Verifique se o backend está rodando (${e.message}).`);
      }
    }
  }, [fetchJson, apiBase, token]);

  useEffect(() => {
    refresh();
    const id = setInterval(refresh, 15000);
    return () => clearInterval(id);
  }, [refresh]);

  const openXml = useCallback(async (doc) => {
    setSelectedId(doc.id);
    setSelectedDoc(doc);
    setExtracted(null);
    setExtractedError(null);
    setExtractedLoading(true);
    try {
      const data = await fetchJson(`/extracted/${doc.id}`);
      setExtracted(data);
    } catch (e) {
      setExtractedError(e.message);
    } finally {
      setExtractedLoading(false);
    }
  }, [fetchJson]);

  const closeDrawer = () => setSelectedId(null);

  const uploadFiles = useCallback(async (files) => {
    setUploading(true);
    const initialQueue = files.map(f => ({ name: f.name, status: "uploading", message: "" }));
    setQueue(prev => [...initialQueue, ...prev]);

    for (const file of files) {
      const form = new FormData();
      form.append("file", file);
      try {
        const result = await fetchJson("/xml/upload", { method: "POST", body: form });
        setQueue(prev => prev.map(q => q.name === file.name && q.status === "uploading"
          ? { ...q, status: result.status === "failed" ? "error" : "done", message: statusMeta(result.status).label }
          : q));
      } catch (e) {
        setQueue(prev => prev.map(q => q.name === file.name && q.status === "uploading"
          ? { ...q, status: "error", message: e.message }
          : q));
      }
    }
    setUploading(false);
    refresh();
  }, [fetchJson, refresh]);

  const avgConfidencePct = dashboard && dashboard.avg_confidence != null
    ? formatNumber(dashboard.avg_confidence * 100, 1) + "%"
    : "—";

  return (
    <div className="wrap">
      <div className="topbar">
        <div className="brand">
          <h1>E-Cernova · Livro Caixa Rural</h1>
          <p>Upload de XML fiscal e resultados de extração</p>
        </div>
        <div className="api-config">
          <span className={"dot " + (apiOk === null ? "pending" : apiOk ? "ok" : "err")} />
          <input
            value={apiBase}
            onChange={(e) => setApiBase(e.target.value)}
            spellCheck={false}
          />
          <button className="btn" onClick={refresh}>Atualizar</button>
          {token && <button className="btn" onClick={() => setToken(null)}>Sair</button>}
        </div>
      </div>

      {!token && <LoginModal apiBase={apiBase} onLogin={setToken} />}

      {globalError && (
        <div className="banner error"><span className="dot err" />{globalError}</div>
      )}

      <div className="stats-row">
        <StatTile label="Total de XMLs" value={dashboard ? dashboard.total_xmls : "—"} />
        <StatTile label="Processados" value={dashboard ? dashboard.processed : "—"} dot="var(--good)" />
        <StatTile label="Pendentes" value={dashboard ? dashboard.pending : "—"} dot="var(--warning)" />
        <StatTile label="Falharam" value={dashboard ? dashboard.failed : "—"} dot="var(--critical)" />
        <StatTile label="Confiança média" value={avgConfidencePct} />
      </div>

      <div className="card">
        <h2>Distribuição por status</h2>
        <StatusDistribution dashboard={dashboard} />
      </div>

      <div className="card">
        <h2>Enviar XML</h2>
        <Dropzone onFiles={uploadFiles} disabled={uploading} />
        {queue.length > 0 && (
          <div className="queue">
            {queue.slice(0, 8).map((q, i) => (
              <div className="queue-item" key={i}>
                <span className="fname">{q.name}</span>
                <span className="qstatus">
                  {q.status === "uploading" && <span style={{ color: "var(--text-muted)" }}>Enviando…</span>}
                  {q.status === "done" && <StatusBadge status="processed" />}
                  {q.status === "error" && <span style={{ color: "var(--critical)" }}>Erro: {q.message}</span>}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="card">
        <div className="toolbar">
          <h2 style={{ margin: 0 }}>XMLs enviados ({xmlList.total})</h2>
          {lastUpdated && <span style={{ fontSize: 11.5, color: "var(--text-muted)" }}>Atualizado às {lastUpdated.toLocaleTimeString("pt-BR")}</span>}
        </div>
        {xmlList.items && xmlList.items.length ? (
          <table>
            <thead>
              <tr>
                <th>Arquivo</th>
                <th>Enviado em</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              {xmlList.items.map(doc => (
                <tr
                  key={doc.id}
                  className={"row-clickable" + (selectedId === doc.id ? " row-selected" : "")}
                  onClick={() => openXml(doc)}
                >
                  <td>{doc.filename}</td>
                  <td>{formatDate(doc.uploaded_at)}</td>
                  <td><StatusBadge status={doc.status} /></td>
                </tr>
              ))}
            </tbody>
          </table>
        ) : (
          <div className="empty-state">Nenhum XML enviado ainda. Envie um arquivo acima para começar.</div>
        )}
        <footer className="hint">Clique em uma linha para ver os itens extraídos.</footer>
      </div>

      <ExtractedDrawer
        open={!!selectedId}
        onClose={closeDrawer}
        xmlDoc={selectedDoc}
        data={extracted}
        loading={extractedLoading}
        error={extractedError}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
