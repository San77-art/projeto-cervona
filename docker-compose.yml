version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cernova-postgres
    environment:
      POSTGRES_USER: cernova
      POSTGRES_PASSWORD: cernova123
      POSTGRES_DB: cernova_dev
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - cernova-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cernova"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      description: "PostgreSQL Database para E-Cernova"

  # PgAdmin (para visualizar DB via UI — opcional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cernova-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cernova.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - cernova-network
    depends_on:
      - postgres
    labels:
      description: "PgAdmin para gerenciar PostgreSQL — acesso em http://localhost:5050"

  # Redis (opcional — para cache/sessions no futuro)
  redis:
    image: redis:7-alpine
    container_name: cernova-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cernova-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      description: "Redis para cache/sessions"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  cernova-network:
    driver: bridge
